<style>
  /* === DESIGN SYSTEM : Brutalist Avantgarde / Neon-Void === */
  :root {
    --primary: #000000;
    --secondary: #ffffff;
    --accent: #ff3b00;
    --font: Impact, system-ui, sans-serif;
    --gap: 48px;
    --padding: 72px;
    --section-gap: 120px;
    --border-thick: 4px;
    --border-med: 3px;
  }

  *, *::before, *::after { box-sizing: border-box; }

  html {
    font-size: 16px;
    scroll-behavior: smooth;
  }

  body {
    font-family: var(--font);
    background: var(--primary);
    color: var(--secondary);
    margin: 0;
    padding: var(--padding);
    min-height: 100vh;
    line-height: 1.3;
    -webkit-font-smoothing: antialiased;
  }

  /* Typography — oversized, raw */
  h1, h2, h3, h4, h5, h6 {
    font-family: inherit;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: -0.02em;
    margin: 0;
    line-height: 0.95;
  }

  h1 { font-size: clamp(3.5rem, 10vw, 6rem); }
  h2 { font-size: clamp(2.5rem, 7vw, 4rem); }
  h3 { font-size: clamp(1.8rem, 4vw, 2.8rem); }
  p  { font-size: 1.125rem; line-height: 1.4; margin: 0; }

  a {
    color: inherit;
    text-decoration: none;
    border-bottom: var(--border-med) solid transparent;
    transition: border-color 0.2s;
  }
  a:hover {
    border-color: var(--accent);
  }

  /* Container — full bleed */
  .container {
    max-width: 1440px;
    margin: 0 auto;
    padding: 0 calc(var(--padding) / 2);
  }

  /* === COMPONENTS === */

  /* Header & Nav */
  header {
    border-bottom: var(--border-thick) solid var(--secondary);
    margin-bottom: var(--gap);
    padding-bottom: var(--gap);
    position: relative;
  }

  .site-title {
    font-size: clamp(1.8rem, 4vw, 2.8rem);
    display: inline-block;
    background: var(--accent);
    color: var(--primary);
    padding: 0.15em 0.4em;
    letter-spacing: -0.03em;
    transform: rotate(-1deg);
    margin-bottom: 0.5em;
  }

  nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: var(--gap);
  }

  .nav-links {
    display: flex;
    gap: var(--gap);
    list-style: none;
    margin: 0;
    padding: 0;
  }

  .nav-links li a {
    font-size: 1.25rem;
    text-transform: uppercase;
    padding: 0.4em 0;
    display: inline-block;
    border-bottom: var(--border-med) solid transparent;
  }
  .nav-links li a:hover {
    border-bottom-color: var(--accent);
  }

  /* Hamburguer — custom checkbox */
  .nav-toggle {
    display: none;
  }

  .hamburger-label {
    display: none;
    flex-direction: column;
    gap: 6px;
    cursor: pointer;
    padding: 8px 4px;
    border: var(--border-med) solid var(--secondary);
    background: transparent;
  }

  .hamburger-label span {
    display: block;
    width: 32px;
    height: 4px;
    background: var(--secondary);
    transition: all 0.3s;
  }

  /* Hero */
  .hero {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: var(--gap);
    margin-bottom: var(--section-gap);
    position: relative;
    align-items: center;
  }

  .hero-content {
    position: relative;
    z-index: 2;
  }

  .hero-content h1 {
    font-size: clamp(4rem, 11vw, 7rem);
    line-height: 0.9;
    margin-bottom: 0.3em;
    background: linear-gradient(135deg, var(--secondary) 30%, var(--accent) 70%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero-content p {
    font-size: 1.4rem;
    max-width: 90%;
    border-left: var(--border-thick) solid var(--accent);
    padding-left: 1em;
    margin-bottom: 1.5em;
  }

  .hero-cta {
    display: inline-block;
    background: var(--accent);
    color: var(--primary);
    font-size: 1.6rem;
    font-weight: 700;
    text-transform: uppercase;
    padding: 0.4em 1.2em;
    border: var(--border-thick) solid var(--accent);
    transition: 0.15s;
    letter-spacing: 0.08em;
    transform: rotate(0.5deg);
  }
  .hero-cta:hover {
    background: var(--primary);
    color: var(--accent);
    border-color: var(--accent);
  }

  .hero-visual {
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    min-height: 300px;
    background: radial-gradient(circle at 30% 30%, var(--accent) 0%, var(--primary) 70%);
    border: var(--border-thick) solid var(--secondary);
    transform: rotate(1deg);
    overflow: hidden;
  }

  .hero-visual::after {
    content: "TOP5";
    font-size: 8rem;
    font-weight: 900;
    color: var(--primary);
    opacity: 0.7;
    letter-spacing: -0.05em;
    position: absolute;
    bottom: -0.1em;
    right: -0.05em;
    line-height: 1;
    transform: rotate(-4deg);
    text-shadow: 4px 4px 0 var(--accent);
  }

  /* Section spacing */
  section {
    margin-bottom: var(--section-gap);
    padding-bottom: var(--section-gap);
    position: relative;
  }

  .section-header {
    display: flex;
    align-items: baseline;
    gap: var(--gap);
    margin-bottom: var(--gap);
    border-bottom: var(--border-thick) solid var(--secondary);
    padding-bottom: 1rem;
  }

  .section-header h2 {
    flex-shrink: 0;
  }

  .section-header span {
    font-size: 1.2rem;
    border: var(--border-med) solid var(--accent);
    padding: 0.2em 0.6em;
    color: var(--accent);
    transform: skewX(-8deg);
  }

  /* About / intro */
  .about-grid {
    display: grid;
    grid-template-columns: 1.3fr 1fr;
    gap: var(--gap);
    align-items: start;
  }

  .about-grid .data-block {
    background: var(--primary);
    border: var(--border-thick) solid var(--secondary);
    padding: 2.5rem;
    position: relative;
    margin-left: -2rem;
    margin-top: -1rem;
  }

  .about-grid .data-block h3 {
    color: var(--accent);
    margin-bottom: 0.5em;
  }

  .about-grid .data-block ul {
    list-style: none;
    padding: 0;
    margin: 0;
    font-size: 1.2rem;
  }

  .about-grid .data-block li {
    border-bottom: 1px solid var(--accent);
    padding: 0.6em 0;
  }

  .about-grid .data-block li::before {
    content: "▸ ";
    color: var(--accent);
  }

  .accent-box {
    background: var(--accent);
    color: var(--primary);
    padding: 3rem;
    border: var(--border-thick) solid var(--secondary);
    transform: rotate(0.5deg);
    font-size: 1.4rem;
    font-weight: 700;
  }

  /* Reviews */
  .review-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: var(--gap);
    margin-top: var(--gap);
  }

  .review-card {
    background: var(--primary);
    border: var(--border-thick) solid var(--secondary);
    padding: 2rem;
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
    position: relative;
    transition: transform 0.2s;
  }
  .review-card:hover {
    transform: rotate(-0.5deg);
  }
  .review-card::before {
    content: "";
    position: absolute;
    top: -8px;
    left: -8px;
    right: 8px;
    bottom: 8px;
    border: var(--border-med) solid var(--accent);
    z-index: -1;
  }

  .review-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--secondary);
    padding-bottom: 0.5rem;
  }

  .review-author {
    font-weight: 700;
    font-size: 1.2rem;
  }

  .review-date {
    font-size: 0.9rem;
    opacity: 0.8;
  }

  .review-stars {
    color: var(--accent);
    font-size: 1.3rem;
    letter-spacing: 4px;
  }

  .review-text {
    font-size: 1.05rem;
    line-height: 1.4;
  }

  /* CTA */
  .cta-section {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: var(--gap);
    align-items: center;
    border-top: var(--border-thick) solid var(--secondary);
    padding-top: var(--gap);
    margin-top: var(--section-gap);
  }

  .cta-section .cta-phone {
    font-size: 2.5rem;
    font-weight: 700;
    background: var(--accent);
    color: var(--primary);
    padding: 0.2em 0.5em;
    display: inline-block;
    transform: rotate(-0.5deg);
    border: var(--border-med) solid var(--secondary);
  }

  /* Footer */
  footer {
    border-top: var(--border-thick) solid var(--secondary);
    padding-top: var(--gap);
    margin-top: var(--section-gap);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: var(--gap);
    font-size: 1rem;
  }

  footer .copyright {
    opacity: 0.7;
  }

  footer .phone-link {
    font-size: 1.5rem;
    font-weight: 700;
    border: var(--border-med) solid var(--accent);
    padding: 0.2em 0.6em;
    transition: 0.2s;
  }
  footer .phone-link:hover {
    background: var(--accent);
    color: var(--primary);
  }

  /* === RESPONSIVE === */
  @media (max-width: 768px) {
    body {
      padding: 24px;
    }
    :root {
      --gap: 32px;
      --padding: 24px;
      --section-gap: 80px;
    }
    .container {
      padding: 0;
    }
    .hero {
      grid-template-columns: 1fr;
      gap: var(--gap);
    }
    .hero-visual {
      min-height: 200px;
      transform: rotate(0deg);
    }
    .hero-visual::after {
      font-size: 5rem;
    }
    .about-grid {
      grid-template-columns: 1fr;
    }
    .about-grid .data-block {
      margin-left: 0;
      margin-top: 0;
    }
    .cta-section {
      grid-template-columns: 1fr;
      text-align: center;
    }
    .section-header {
      flex-direction: column;
      gap: 0.5rem;
    }

    /* Hamburger */
    .nav-links {
      display: none;
      flex-direction: column;
      width: 100%;
      background: var(--primary);
      padding: var(--gap) 0;
      border-top: var(--border-thick) solid var(--secondary);
    }

    .nav-toggle:checked ~ .nav-links {
      display: flex;
    }

    .hamburger-label {
      display: flex;
    }

    nav {
      flex-wrap: wrap;
    }
  }
</style>
</head>
<body>
<header>
  <div class="container">
    <div class="site-title">염창 룸싸롱 TOP5</
</body>
